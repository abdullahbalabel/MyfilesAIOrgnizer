<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading MyFiles AI Organizer</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --primary: #4f46e5;
      --primary-glow: rgba(79, 70, 229, 0.4);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      /* Drag functionality for the title bar area, though splash is usually not dragged */
      -webkit-app-region: drag;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80%;
      max-width: 400px;
    }

    .logo-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--surface) 0%, rgba(26,26,46,0.6) 100%);
      box-shadow: 0 0 30px var(--primary-glow), inset 0 1px 1px rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 3s ease-in-out infinite;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .logo-container svg {
      color: var(--primary);
      width: 40px;
      height: 40px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #fff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p#status {
      margin: 0 0 32px 0;
      font-size: 13px;
      color: var(--text-muted);
      height: 18px;
    }

    .progress-wrapper {
      width: 100%;
      height: 4px;
      background: var(--surface);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4f46e5, #818cf8);
      border-radius: 4px;
      box-shadow: 0 0 10px var(--primary-glow);
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        <line x1="12" y1="11" x2="12" y2="17"/>
        <line x1="9" y1="14" x2="15" y2="14"/>
      </svg>
    </div>
    <h1>MyFiles AI</h1>
    <p id="status">Waking up...</p>
    
    <div class="progress-wrapper">
      <div class="progress-bar" id="progress"></div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron')

    const statusEl = document.getElementById('status')
    const progressEl = document.getElementById('progress')

    ipcRenderer.on('splash:update', (event, { message, progress }) => {
      if (message) statusEl.textContent = message
      if (progress !== undefined) progressEl.style.width = `${progress}%`
    })
  </script>
</body>
</html>
